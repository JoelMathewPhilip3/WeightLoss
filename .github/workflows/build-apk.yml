name: Build WeightLoss APKs

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
          cache-cleanup: always

      - name: Build phone APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Build watch APK
        run: gradle :wear:assembleDebug --stacktrace

      - name: Upload phone APK
        uses: actions/upload-artifact@v4
        with:
          name: WeightLoss-phone-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload watch APK
        uses: actions/upload-artifact@v4
        with:
          name: WeightLoss-watch-debug-apk
          path: wear/build/outputs/apk/debug/wear-debug.apk
